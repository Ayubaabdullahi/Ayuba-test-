<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up - Talba Premium SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root { --brand: #003366; --gold: #ffb400; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #003366, #001f3f);
    margin: 0; height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.container {
    background: white; color: #333; padding: 40px 35px;
    border-radius: 24px; width: 100%; max-width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3); text-align: center;
}
.logo {
    width: 90px; height: 90px; background: var(--gold); color: var(--brand);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 20px;
}
h2 { color: var(--brand); margin-bottom: 10px; }
input {
    width: 100%; padding: 15px; margin: 10px 0;
    border: 2px solid #ddd; border-radius: 12px; font-size: 16px;
}
button {
    width: 100%; padding: 16px; background: var(--brand); color: white;
    border: none; border-radius: 12px; font-size: 17px; font-weight: bold;
    cursor: pointer; margin-top: 10px;
}
.error { color: #ef4444; margin-top: 15px; font-size: 14px; }
.success { color: #16a34a; margin-top: 15px; font-size: 14px; }
.toggle-btn { background: none; border: none; color: var(--brand); cursor: pointer; margin-top: 15px; font-weight: 600; }
</style>
</head>
<body>

<div class="container">
    <div class="logo">🔑</div>
    <h2 id="formTitle">Login</h2>
    <p id="formSubtitle">Sign in to continue</p>

    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">

    <button id="actionBtn" onclick="handleAuth()">Login</button>
    
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <button class="toggle-btn" id="toggleBtn" onclick="toggleForm()">Don't have an account? Sign Up</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDm35w4edp811CsLhyiUSUqlkEt69_BWYU",
  authDomain: "loginsysterm.firebaseapp.com",
  projectId: "loginsysterm",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ADMIN IDENTITY
const ADMIN_EMAIL = "ayubaabdullahi131@gmail.com";
let isLogin = true;

function toggleForm() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById('formSubtitle').innerText = isLogin ? "Sign in to continue" : "Create new account";
    document.getElementById('actionBtn').innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById('toggleBtn').innerText = isLogin ? "Don't have an account? Sign Up" : "Already have account? Login";
    document.getElementById('errorMsg').innerHTML = "";
    document.getElementById('successMsg').innerHTML = "";
}

async function handleAuth() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    errorMsg.innerHTML = "";
    successMsg.innerHTML = "";

    if (!email || !password) {
        errorMsg.innerHTML = "Please enter email and password";
        return;
    }

    try {
        if (isLogin) {
            // --- LOGIN LOGIC ---
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // Check if user is Admin (MAJOR)
            if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                localStorage.setItem("userRole", "admin");
                localStorage.setItem("userEmail", email);
                successMsg.innerHTML = "Welcome back, Major! Redirecting...";
                setTimeout(() => window.location.href = "admin-panel.html", 1000);
            } else {
                localStorage.setItem("userRole", "teacher");
                localStorage.setItem("userEmail", email);
                successMsg.innerHTML = "Login successful! Opening Dashboard...";
                // Tura malami zuwa dashboard dinsa (index.html ko teacher-dashboard.html)
                setTimeout(() => window.location.href = "dashboard.html", 1000);
            }
        } else {
            // --- SIGN UP LOGIC ---
            await auth.createUserWithEmailAndPassword(email, password);
            successMsg.innerHTML = "Account created! Redirecting to login...";
            
            // Bayan malami ya yi register, muna bukatar admin ya ba shi access a admin panel
            setTimeout(() => {
                isLogin = true;
                toggleForm();
            }, 2000);
        }
    } catch (error) {
        console.error(error);
        if (error.code === "auth/email-already-in-use") {
            errorMsg.innerHTML = "Wannan Email ɗin ya riga ya kasance a system.";
        } else if (error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
            errorMsg.innerHTML = "Email ko Password ba su yi daidai ba.";
        } else if (error.code === "auth/weak-password") {
            errorMsg.innerHTML = "Password ɗinka ya yi rauni sosai.";
        } else {
            errorMsg.innerHTML = "Error: " + error.message;
        }
    }
}

// Allow Enter key
document.getElementById('password').addEventListener("keypress", (e) => {
    if (e.key === "Enter") handleAuth();
});
</script>

</body>
</html>
